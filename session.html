<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Session Viewer</title>
  <link rel="stylesheet" href="./shared/deck.css" />
  <link rel="stylesheet" href="./shared/vendor/katex/katex.min.css" />
  <script src="./shared/vendor/katex/katex.min.js"></script>
</head>

<body>
  <div class="deck-scale" id="deckScale">
    <div class="deck-container" id="deck">
      <!-- Top brand bar -->
      <div class="brand-bar"></div>

      <!-- Home button with icon -->
      <a class="home-btn" id="homeBtn" href="./index.html" aria-label="Home">
        ⌂
      </a>

      <!-- HUD label -->
      <div class="course-code" id="hudLabel">Loading session…</div>

      <!-- NOTE: removed top-right logo img on purpose -->

      <!-- Bottom email -->
      <div class="email-footer">
        <span class="email-label" style="font-weight:900;">Email:</span>
        <a id="emailLink" href="mailto:karimza@algonquincollege.com">
          karimza@algonquincollege.com
        </a>
      </div>

      <!-- Slide counter -->
      <div class="slide-counter" id="counter"></div>

      <!-- Nav buttons with icons -->
      <div class="controls">
        <button type="button" class="nav-btn" id="prevBtn" aria-label="Previous">
          &#8249;
        </button>

        <button type="button" class="nav-btn pdf-btn" id="pdfBtn" aria-label="Export PDF">
          PDF
        </button>

        <button type="button" class="nav-btn" id="nextBtn" aria-label="Next">
          &#8250;
        </button>
      </div>

      <!-- Slides -->
      <div id="slidesRoot"></div>
    </div>
  </div>

  <script type="module">
    import { initDeck } from "./shared/deck.js";
    import { buildDefaultTimelinePath, createLecturePlayer } from "./shared/lecture_player.js";
    import { bootSession } from "./shared/session_loader.js";

    const controller = await bootSession({ initDeck });
    const params = new URLSearchParams(window.location.search);

    if (controller) {
      document.body.dataset.deckReady = "true";
      document.body.dataset.currentSlideId = controller.getCurrentSlideId();

      if (params.get("debug") === "1") {
        controller.setDebugOverlay(true);
      }

      if (params.get("analysis") === "1") {
        const assetTimeoutMs = Number(params.get("assetTimeoutMs") || 2500);
        await controller.waitForSettledState({ assetTimeoutMs });
        const manifest = await controller.exportLayoutManifest({ assetTimeoutMs });
        const payload = document.createElement("script");
        payload.type = "application/json";
        payload.id = "deck-analysis-manifest";
        payload.textContent = JSON.stringify(manifest);
        document.body.appendChild(payload);
        document.body.dataset.analysisReady = "true";
      }

      if (params.get("lecture") && params.get("analysis") !== "1") {
        const descriptor = controller.descriptor || {
          school: params.get("school") || "AC",
          course: params.get("course") || "",
          session: params.get("session") || "",
          topic: params.get("topic") || "",
        };

        const lecturePlayer = createLecturePlayer({
          deckController: controller,
          gapMs: Number(params.get("lectureGapMs") || 350),
          mediaSourceMode: params.get("mediaSource") || "compiled",
        });

        const lectureParam = params.get("lecture");
        const timelinePath = lectureParam === "1"
          ? buildDefaultTimelinePath(descriptor)
          : lectureParam;

        try {
          await lecturePlayer.loadFromUrl(timelinePath.startsWith("http")
            ? timelinePath
            : `/${timelinePath.replace(/^\/+/, "")}`);
          document.body.dataset.lectureReady = "true";
          const shouldAutoplay = params.get("autoplay") === "1"
            || (!params.has("autoplay") && lecturePlayer.getTimeline()?.autoplay_default);
          if (shouldAutoplay) {
            await lecturePlayer.play();
          }
        } catch (error) {
          console.error("Failed to load lecture timeline:", error);
        }
      }
    }
  </script>
</body>

</html>
