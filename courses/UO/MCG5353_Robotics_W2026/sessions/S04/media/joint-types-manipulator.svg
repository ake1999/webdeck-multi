<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc">
  <title id="title">Common URDF joint types for manipulators</title>
  <desc id="desc">Cards for fixed, revolute, continuous, and prismatic joint types with manipulator examples.</desc>
  <rect width="1200" height="720" fill="#f8fafc"/>
  <text x="600" y="70" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="36" font-weight="800" fill="#0f172a">Joint type controls how the child link can move</text>
  <g font-family="Inter, Arial, sans-serif">
    <g transform="translate(80 150)">
      <rect width="245" height="390" rx="20" fill="#ffffff" stroke="#64748b" stroke-width="4"/>
      <text x="122" y="55" text-anchor="middle" font-size="28" font-weight="800" fill="#0f172a">fixed</text>
      <line x1="55" y1="170" x2="190" y2="170" stroke="#334155" stroke-width="14" stroke-linecap="round"/>
      <rect x="75" y="130" width="50" height="80" rx="10" fill="#bfdbfe"/>
      <rect x="130" y="130" width="50" height="80" rx="10" fill="#bbf7d0"/>
      <text x="122" y="275" text-anchor="middle" font-size="21" font-weight="800" fill="#334155">no motion</text>
      <text x="122" y="320" text-anchor="middle" font-size="19" fill="#475569">sensor mount</text>
      <text x="122" y="348" text-anchor="middle" font-size="19" fill="#475569">tool adapter</text>
    </g>
    <g transform="translate(365 150)">
      <rect width="245" height="390" rx="20" fill="#ffffff" stroke="#64748b" stroke-width="4"/>
      <text x="122" y="55" text-anchor="middle" font-size="28" font-weight="800" fill="#0f172a">revolute</text>
      <circle cx="122" cy="165" r="55" fill="#fef3c7" stroke="#f59e0b" stroke-width="7"/>
      <path d="M122 165l45-20" stroke="#334155" stroke-width="10" stroke-linecap="round"/>
      <path d="M83 132a64 64 0 0 1 82-18" fill="none" stroke="#ef4444" stroke-width="7" stroke-linecap="round"/>
      <text x="122" y="275" text-anchor="middle" font-size="21" font-weight="800" fill="#334155">limited rotation</text>
      <text x="122" y="320" text-anchor="middle" font-size="19" fill="#475569">Panda arm joints</text>
      <text x="122" y="348" text-anchor="middle" font-size="19" fill="#475569">shoulder/elbow/wrist</text>
    </g>
    <g transform="translate(650 150)">
      <rect width="245" height="390" rx="20" fill="#ffffff" stroke="#64748b" stroke-width="4"/>
      <text x="122" y="55" text-anchor="middle" font-size="28" font-weight="800" fill="#0f172a">continuous</text>
      <circle cx="122" cy="165" r="55" fill="#ede9fe" stroke="#8b5cf6" stroke-width="7"/>
      <path d="M88 165a34 34 0 1 0 65-14" fill="none" stroke="#334155" stroke-width="9" stroke-linecap="round"/>
      <path d="M151 151l-4 25 22-11z" fill="#334155"/>
      <text x="122" y="275" text-anchor="middle" font-size="21" font-weight="800" fill="#334155">unlimited rotation</text>
      <text x="122" y="320" text-anchor="middle" font-size="19" fill="#475569">wheels</text>
      <text x="122" y="348" text-anchor="middle" font-size="19" fill="#475569">some rotating tools</text>
    </g>
    <g transform="translate(935 150)">
      <rect width="245" height="390" rx="20" fill="#ffffff" stroke="#64748b" stroke-width="4"/>
      <text x="122" y="55" text-anchor="middle" font-size="28" font-weight="800" fill="#0f172a">prismatic</text>
      <rect x="62" y="140" width="120" height="45" rx="10" fill="#fee2e2" stroke="#ef4444" stroke-width="5"/>
      <path d="M55 215h135" stroke="#334155" stroke-width="8" stroke-linecap="round"/>
      <path d="M190 215l-22-14v28z" fill="#334155"/>
      <text x="122" y="275" text-anchor="middle" font-size="21" font-weight="800" fill="#334155">linear sliding</text>
      <text x="122" y="320" text-anchor="middle" font-size="19" fill="#475569">grippers</text>
      <text x="122" y="348" text-anchor="middle" font-size="19" fill="#475569">linear rails</text>
    </g>
  </g>
  <text x="600" y="645" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="800" fill="#0f172a">Panda arm joints are mostly revolute; the finger motion is prismatic-style gripper motion</text>
</svg>
