<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc">
  <title id="title">Panda description to RViz pipeline</title>
  <desc id="desc">A left to right pipeline from Panda Xacro to robot_description, joint states, robot state publisher, TF, and RViz RobotModel.</desc>
  <rect width="1200" height="720" fill="#f8fafc"/>
  <text x="600" y="70" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="36" font-weight="800" fill="#0f172a">How the Panda becomes visible in RViz2</text>
  <g font-family="Inter, Arial, sans-serif">
    <g transform="translate(50 165)">
      <rect width="170" height="150" rx="18" fill="#fff7ed" stroke="#fb923c" stroke-width="4"/>
      <text x="85" y="58" text-anchor="middle" font-size="24" font-weight="800" fill="#9a3412">Panda</text>
      <text x="85" y="91" text-anchor="middle" font-size="22" font-weight="700" fill="#9a3412">URDF/Xacro</text>
      <text x="85" y="123" text-anchor="middle" font-size="18" fill="#7c2d12">links + joints</text>
    </g>
    <g transform="translate(280 165)">
      <rect width="180" height="150" rx="18" fill="#ecfeff" stroke="#06b6d4" stroke-width="4"/>
      <text x="90" y="60" text-anchor="middle" font-size="22" font-weight="800" fill="#164e63">robot_description</text>
      <text x="90" y="98" text-anchor="middle" font-size="19" fill="#155e75">parameter</text>
      <text x="90" y="126" text-anchor="middle" font-size="18" fill="#155e75">URDF string</text>
    </g>
    <g transform="translate(520 125)">
      <rect width="190" height="105" rx="18" fill="#eef2ff" stroke="#6366f1" stroke-width="4"/>
      <text x="95" y="45" text-anchor="middle" font-size="21" font-weight="800" fill="#3730a3">joint_state</text>
      <text x="95" y="72" text-anchor="middle" font-size="21" font-weight="800" fill="#3730a3">publisher GUI</text>
    </g>
    <g transform="translate(520 280)">
      <rect width="190" height="105" rx="18" fill="#f0fdf4" stroke="#22c55e" stroke-width="4"/>
      <text x="95" y="45" text-anchor="middle" font-size="21" font-weight="800" fill="#166534">robot_state</text>
      <text x="95" y="72" text-anchor="middle" font-size="21" font-weight="800" fill="#166534">publisher</text>
    </g>
    <g transform="translate(770 165)">
      <rect width="170" height="150" rx="18" fill="#fef2f2" stroke="#ef4444" stroke-width="4"/>
      <text x="85" y="58" text-anchor="middle" font-size="25" font-weight="800" fill="#991b1b">TF</text>
      <text x="85" y="92" text-anchor="middle" font-size="20" fill="#991b1b">/tf</text>
      <text x="85" y="122" text-anchor="middle" font-size="20" fill="#991b1b">/tf_static</text>
    </g>
    <g transform="translate(1000 165)">
      <rect width="150" height="150" rx="18" fill="#f5f3ff" stroke="#8b5cf6" stroke-width="4"/>
      <text x="75" y="61" text-anchor="middle" font-size="25" font-weight="800" fill="#5b21b6">RViz2</text>
      <text x="75" y="96" text-anchor="middle" font-size="19" fill="#5b21b6">RobotModel</text>
      <text x="75" y="123" text-anchor="middle" font-size="19" fill="#5b21b6">TF display</text>
    </g>
  </g>
  <g stroke="#334155" stroke-width="5" stroke-linecap="round" fill="none">
    <path d="M220 240h50"/>
    <path d="M460 240h45"/>
    <path d="M710 182c28 0 38 20 52 42"/>
    <path d="M710 332c28 0 38-45 52-72"/>
    <path d="M940 240h50"/>
  </g>
  <g fill="#334155">
    <path d="M270 240l-16-11v22z"/>
    <path d="M505 240l-16-11v22z"/>
    <path d="M762 224l-19-4 13 18z"/>
    <path d="M762 260l-16 11 2-21z"/>
    <path d="M990 240l-16-11v22z"/>
  </g>
  <rect x="280" y="475" width="640" height="105" rx="18" fill="#ffffff" stroke="#cbd5e1" stroke-width="3"/>
  <text x="600" y="515" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="25" font-weight="800" fill="#0f172a">Today: make this pipeline work and debug it</text>
  <text x="600" y="552" text-anchor="middle" font-family="Ubuntu Mono, Consolas, monospace" font-size="24" fill="#334155">robot_description + /joint_states + /tf -> RViz2</text>
</svg>
