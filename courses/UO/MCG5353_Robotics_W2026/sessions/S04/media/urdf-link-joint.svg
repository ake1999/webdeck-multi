<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc">
  <title id="title">URDF link and joint relationship</title>
  <desc id="desc">Two rigid links connected by a joint with origin and axis labels.</desc>
  <rect width="1200" height="720" fill="#f8fafc"/>
  <text x="600" y="70" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="36" font-weight="800" fill="#0f172a">URDF describes links connected by joints</text>
  <g transform="translate(140 240)">
    <rect x="0" y="60" width="280" height="130" rx="20" fill="#dbeafe" stroke="#2563eb" stroke-width="5"/>
    <text x="140" y="132" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="30" font-weight="800" fill="#1e3a8a">parent link</text>
    <circle cx="390" cy="125" r="55" fill="#fef3c7" stroke="#f59e0b" stroke-width="5"/>
    <text x="390" y="132" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="800" fill="#92400e">joint</text>
    <rect x="520" y="20" width="310" height="210" rx="20" fill="#dcfce7" stroke="#16a34a" stroke-width="5"/>
    <text x="675" y="132" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="30" font-weight="800" fill="#166534">child link</text>
    <path d="M280 125h80" stroke="#334155" stroke-width="8" stroke-linecap="round"/>
    <path d="M445 125h75" stroke="#334155" stroke-width="8" stroke-linecap="round"/>
    <path d="M390 125v-105" stroke="#ef4444" stroke-width="6" stroke-linecap="round"/>
    <path d="M390 20l-15 22h30z" fill="#ef4444"/>
    <text x="430" y="45" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="800" fill="#991b1b">axis</text>
    <circle cx="390" cy="125" r="10" fill="#111827"/>
    <text x="322" y="235" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="800" fill="#0f172a">origin: transform from parent to joint</text>
  </g>
  <rect x="175" y="575" width="850" height="62" rx="16" fill="#ffffff" stroke="#cbd5e1" stroke-width="3"/>
  <text x="600" y="613" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="800" fill="#0f172a">For a robot arm, every shoulder/elbow/wrist joint adds another frame relationship</text>
</svg>
