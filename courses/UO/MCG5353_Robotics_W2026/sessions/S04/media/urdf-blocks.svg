<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc">
  <title id="title">URDF visual collision and inertial blocks</title>
  <desc id="desc">Three cards explaining visual, collision, and inertial URDF blocks and which tools use them.</desc>
  <rect width="1200" height="720" fill="#f8fafc"/>
  <text x="600" y="72" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="36" font-weight="800" fill="#0f172a">A link can have visual, collision, and inertial information</text>
  <g font-family="Inter, Arial, sans-serif">
    <g transform="translate(80 150)">
      <rect width="320" height="420" rx="22" fill="#ffffff" stroke="#3b82f6" stroke-width="5"/>
      <text x="160" y="58" text-anchor="middle" font-size="32" font-weight="800" fill="#1e3a8a">visual</text>
      <rect x="88" y="115" width="145" height="145" rx="22" fill="#bfdbfe" stroke="#2563eb" stroke-width="5"/>
      <circle cx="160" cy="188" r="38" fill="#60a5fa"/>
      <text x="160" y="315" text-anchor="middle" font-size="23" font-weight="800" fill="#0f172a">what you see</text>
      <text x="160" y="355" text-anchor="middle" font-size="21" fill="#475569">mesh, color, shape</text>
      <text x="160" y="395" text-anchor="middle" font-size="21" fill="#475569">used heavily in RViz</text>
    </g>
    <g transform="translate(460 150)">
      <rect width="320" height="420" rx="22" fill="#ffffff" stroke="#ef4444" stroke-width="5"/>
      <text x="160" y="58" text-anchor="middle" font-size="32" font-weight="800" fill="#991b1b">collision</text>
      <rect x="82" y="110" width="156" height="156" rx="10" fill="#fecaca" stroke="#ef4444" stroke-width="5" stroke-dasharray="12 8"/>
      <line x1="95" y1="122" x2="225" y2="252" stroke="#991b1b" stroke-width="5"/>
      <line x1="225" y1="122" x2="95" y2="252" stroke="#991b1b" stroke-width="5"/>
      <text x="160" y="315" text-anchor="middle" font-size="23" font-weight="800" fill="#0f172a">what can collide</text>
      <text x="160" y="355" text-anchor="middle" font-size="21" fill="#475569">simpler geometry</text>
      <text x="160" y="395" text-anchor="middle" font-size="21" fill="#475569">used by planning</text>
    </g>
    <g transform="translate(840 150)">
      <rect width="320" height="420" rx="22" fill="#ffffff" stroke="#22c55e" stroke-width="5"/>
      <text x="160" y="58" text-anchor="middle" font-size="32" font-weight="800" fill="#166534">inertial</text>
      <circle cx="160" cy="170" r="58" fill="#dcfce7" stroke="#22c55e" stroke-width="5"/>
      <path d="M160 110v120M100 170h120" stroke="#166534" stroke-width="7" stroke-linecap="round"/>
      <text x="160" y="315" text-anchor="middle" font-size="23" font-weight="800" fill="#0f172a">how mass behaves</text>
      <text x="160" y="355" text-anchor="middle" font-size="21" fill="#475569">mass + inertia</text>
      <text x="160" y="395" text-anchor="middle" font-size="21" fill="#475569">used by simulation</text>
    </g>
  </g>
  <rect x="190" y="625" width="820" height="58" rx="16" fill="#ffffff" stroke="#cbd5e1" stroke-width="3"/>
  <text x="600" y="661" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="800" fill="#0f172a">RViz can show the robot even when collision or inertial details are not visually obvious</text>
</svg>
