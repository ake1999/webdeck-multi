<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc">
  <title id="title">Xacro structure for Panda resources</title>
  <desc id="desc">A package tree showing Panda description with urdf, meshes, xacro, and generated robot_description output.</desc>
  <rect width="1200" height="720" fill="#f8fafc"/>
  <text x="600" y="70" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="36" font-weight="800" fill="#0f172a">Xacro keeps robot descriptions reusable</text>
  <g font-family="Ubuntu Mono, Consolas, monospace" font-size="25">
    <rect x="95" y="130" width="500" height="430" rx="20" fill="#111827"/>
    <text x="135" y="180" fill="#dbeafe">moveit_resources_panda_description/</text>
    <text x="165" y="230" fill="#bfdbfe">urdf/</text>
    <text x="205" y="280" fill="#bbf7d0">panda.urdf.xacro</text>
    <text x="205" y="330" fill="#e5e7eb">panda.urdf</text>
    <text x="165" y="390" fill="#bfdbfe">meshes/</text>
    <text x="205" y="440" fill="#e5e7eb">visual meshes</text>
    <text x="205" y="490" fill="#e5e7eb">collision meshes</text>
  </g>
  <g stroke="#334155" stroke-width="6" stroke-linecap="round" fill="none">
    <path d="M620 350h120"/>
  </g>
  <path d="M740 350l-20-14v28z" fill="#334155"/>
  <g font-family="Inter, Arial, sans-serif">
    <rect x="780" y="170" width="350" height="280" rx="22" fill="#ffffff" stroke="#06b6d4" stroke-width="5"/>
    <text x="955" y="225" text-anchor="middle" font-size="30" font-weight="800" fill="#164e63">xacro command</text>
    <text x="955" y="285" text-anchor="middle" font-family="Ubuntu Mono, Consolas, monospace" font-size="23" fill="#334155">xacro panda.urdf.xacro</text>
    <rect x="835" y="330" width="240" height="70" rx="16" fill="#ecfeff" stroke="#06b6d4" stroke-width="3"/>
    <text x="955" y="374" text-anchor="middle" font-size="26" font-weight="800" fill="#164e63">robot_description</text>
  </g>
  <rect x="210" y="620" width="780" height="58" rx="16" fill="#fff7ed" stroke="#fb923c" stroke-width="3"/>
  <text x="600" y="656" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="800" fill="#9a3412">For students: inspect the Xacro, but launch it through robot_state_publisher</text>
</svg>
