<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc">
  <title id="title">Before and after sourcing ROS 2 Humble</title>
  <desc id="desc">Two terminal panels showing ros2 unavailable before sourcing and ROS_DISTRO=humble after sourcing setup.bash.</desc>
  <defs>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#0f172a" flood-opacity="0.18"/>
    </filter>
  </defs>
  <rect width="1200" height="720" fill="#f8fafc"/>
  <text x="600" y="70" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="34" font-weight="800" fill="#0f172a">A terminal only knows ROS after you source the environment</text>

  <g filter="url(#shadow)">
    <rect x="70" y="125" width="500" height="350" rx="18" fill="#111827"/>
    <rect x="70" y="125" width="500" height="54" rx="18" fill="#374151"/>
    <circle cx="105" cy="153" r="8" fill="#ef4444"/>
    <circle cx="132" cy="153" r="8" fill="#f59e0b"/>
    <circle cx="159" cy="153" r="8" fill="#22c55e"/>
    <text x="93" y="218" font-family="Ubuntu Mono, Consolas, monospace" font-size="26" fill="#e5e7eb">$ ros2 node list</text>
    <text x="93" y="266" font-family="Ubuntu Mono, Consolas, monospace" font-size="26" fill="#fca5a5">ros2: command not found</text>
    <text x="320" y="420" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="26" font-weight="800" fill="#fca5a5">Before sourcing</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="630" y="125" width="500" height="350" rx="18" fill="#082f49"/>
    <rect x="630" y="125" width="500" height="54" rx="18" fill="#0e7490"/>
    <circle cx="665" cy="153" r="8" fill="#ef4444"/>
    <circle cx="692" cy="153" r="8" fill="#f59e0b"/>
    <circle cx="719" cy="153" r="8" fill="#22c55e"/>
    <text x="653" y="218" font-family="Ubuntu Mono, Consolas, monospace" font-size="24" fill="#e0f2fe">$ source /opt/ros/humble/setup.bash</text>
    <text x="653" y="266" font-family="Ubuntu Mono, Consolas, monospace" font-size="24" fill="#e0f2fe">$ printenv | grep -i ROS</text>
    <text x="653" y="314" font-family="Ubuntu Mono, Consolas, monospace" font-size="24" fill="#bbf7d0">ROS_VERSION=2</text>
    <text x="653" y="360" font-family="Ubuntu Mono, Consolas, monospace" font-size="24" fill="#bbf7d0">ROS_DISTRO=humble</text>
    <text x="880" y="420" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="26" font-weight="800" fill="#bae6fd">After sourcing</text>
  </g>

  <path d="M585 300h35" stroke="#0f172a" stroke-width="6" stroke-linecap="round"/>
  <path d="M620 300l-18-15v30z" fill="#0f172a"/>

  <rect x="190" y="540" width="820" height="92" rx="18" fill="#ffffff" stroke="#cbd5e1" stroke-width="3"/>
  <text x="600" y="581" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="800" fill="#0f172a">Optional once-only setup for new terminals</text>
  <text x="600" y="616" text-anchor="middle" font-family="Ubuntu Mono, Consolas, monospace" font-size="23" fill="#334155">echo "source /opt/ros/humble/setup.bash" &gt;&gt; ~/.bashrc</text>
</svg>
