<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 640" role="img" aria-labelledby="title desc">
  <title id="title">Manipulator ROS graph overview</title>
  <desc id="desc">Robot arm in the center connected to typical ROS 2 manipulator nodes and topics.</desc>
  <rect width="1000" height="640" fill="#fff"/>
  <style>
    .title{font:700 34px system-ui,Segoe UI,Arial;fill:#0f172a}
    .node{fill:#fff;stroke:#8a1538;stroke-width:3;rx:18}
    .robot{fill:#fff7ed;stroke:#f97316;stroke-width:4;rx:24}
    .topic{font:700 16px ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;fill:#334155}
    .label{font:700 20px system-ui,Segoe UI,Arial;fill:#0f172a}
    .small{font:500 15px system-ui,Segoe UI,Arial;fill:#475569}
    .line{stroke:#64748b;stroke-width:3;fill:none;stroke-linecap:round;stroke-dasharray:8 8}
  </style>
  <text class="title" x="44" y="58">Manipulator ROS 2 Graph</text>
  <rect class="robot" x="390" y="230" width="220" height="150"/>
  <text class="label" x="500" y="286" text-anchor="middle">Robot Arm</text>
  <text class="small" x="500" y="318" text-anchor="middle">joints, links, frames</text>
  <path d="M465 350 L485 290 L525 290 L545 350" stroke="#f97316" stroke-width="10" fill="none" stroke-linecap="round"/>
  <circle cx="465" cy="350" r="11" fill="#8a1538"/>
  <circle cx="485" cy="290" r="11" fill="#8a1538"/>
  <circle cx="525" cy="290" r="11" fill="#8a1538"/>
  <circle cx="545" cy="350" r="11" fill="#8a1538"/>

  <rect class="node" x="72" y="120" width="235" height="78"/>
  <text class="label" x="189" y="153" text-anchor="middle">joint_state_publisher</text>
  <text class="topic" x="189" y="179" text-anchor="middle">/joint_states</text>
  <rect class="node" x="72" y="438" width="235" height="78"/>
  <text class="label" x="189" y="471" text-anchor="middle">robot_state_publisher</text>
  <text class="topic" x="189" y="497" text-anchor="middle">/tf + /robot_description</text>
  <rect class="node" x="382" y="76" width="236" height="78"/>
  <text class="label" x="500" y="109" text-anchor="middle">RViz2</text>
  <text class="topic" x="500" y="135" text-anchor="middle">visualizes ROS data</text>
  <rect class="node" x="694" y="120" width="235" height="78"/>
  <text class="label" x="812" y="153" text-anchor="middle">MoveIt</text>
  <text class="topic" x="812" y="179" text-anchor="middle">/planning_scene</text>
  <rect class="node" x="694" y="438" width="235" height="78"/>
  <text class="label" x="812" y="471" text-anchor="middle">controller_manager</text>
  <text class="topic" x="812" y="497" text-anchor="middle">/joint_trajectory</text>
  <rect class="node" x="382" y="486" width="236" height="78"/>
  <text class="label" x="500" y="519" text-anchor="middle">Gazebo</text>
  <text class="topic" x="500" y="545" text-anchor="middle">simulated world</text>

  <path class="line" d="M307 159 C360 190 378 226 390 260"/>
  <path class="line" d="M307 477 C360 438 378 396 390 350"/>
  <path class="line" d="M500 154 V230"/>
  <path class="line" d="M694 159 C640 190 622 226 610 260"/>
  <path class="line" d="M694 477 C640 438 622 396 610 350"/>
  <path class="line" d="M500 486 V380"/>
</svg>
