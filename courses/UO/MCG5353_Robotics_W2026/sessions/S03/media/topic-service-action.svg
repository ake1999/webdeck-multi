<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 640" role="img" aria-labelledby="title desc">
  <title id="title">ROS communication choice diagram</title>
  <desc id="desc">Comparison of topics, services, and actions.</desc>
  <rect width="1000" height="640" fill="#fff"/>
  <style>
    .title{font:700 34px system-ui,Segoe UI,Arial;fill:#0f172a}
    .panel{fill:#fff;stroke:#8a1538;stroke-width:3;rx:22}
    .label{font:700 28px system-ui,Segoe UI,Arial;fill:#0f172a}
    .note{font:500 18px system-ui,Segoe UI,Arial;fill:#475569}
    .code{font:700 18px ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;fill:#334155}
    .line{stroke:#8a1538;stroke-width:5;fill:none;stroke-linecap:round;marker-end:url(#arrow)}
    .dash{stroke:#64748b;stroke-width:4;fill:none;stroke-linecap:round;stroke-dasharray:8 8;marker-end:url(#arrow2)}
  </style>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#8a1538"/></marker>
    <marker id="arrow2" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#64748b"/></marker>
  </defs>
  <text class="title" x="44" y="58">Pick The Right Communication</text>
  <rect class="panel" x="54" y="122" width="280" height="398"/>
  <text class="label" x="194" y="172" text-anchor="middle">Topic</text>
  <text class="note" x="194" y="210" text-anchor="middle">continuous stream</text>
  <path class="line" d="M105 282H285"/>
  <path class="line" d="M105 332H285"/>
  <path class="line" d="M105 382H285"/>
  <text class="code" x="194" y="458" text-anchor="middle">/joint_states</text>
  <rect class="panel" x="360" y="122" width="280" height="398"/>
  <text class="label" x="500" y="172" text-anchor="middle">Service</text>
  <text class="note" x="500" y="210" text-anchor="middle">request -> response</text>
  <path class="line" d="M410 305H590"/>
  <path class="dash" d="M590 365H410"/>
  <text class="code" x="500" y="458" text-anchor="middle">reset / query / trigger</text>
  <rect class="panel" x="666" y="122" width="280" height="398"/>
  <text class="label" x="806" y="172" text-anchor="middle">Action</text>
  <text class="note" x="806" y="210" text-anchor="middle">goal + feedback + result</text>
  <path class="line" d="M716 282H896"/>
  <path class="dash" d="M896 335H716"/>
  <path class="dash" d="M896 388H716"/>
  <text class="code" x="806" y="458" text-anchor="middle">motion goal</text>
</svg>
