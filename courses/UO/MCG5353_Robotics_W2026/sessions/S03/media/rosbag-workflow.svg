<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 640" role="img" aria-labelledby="title desc">
  <title id="title">rosbag workflow</title>
  <desc id="desc">ROS topics are recorded to a bag file and replayed later into tools for debugging.</desc>
  <rect width="1000" height="640" fill="#fff"/>
  <style>
    .title{font:700 34px system-ui,Segoe UI,Arial;fill:#0f172a}
    .box{fill:#fff;stroke:#8a1538;stroke-width:3;rx:22}
    .bag{fill:#fff7ed;stroke:#f97316;stroke-width:4;rx:28}
    .arrow{stroke:#8a1538;stroke-width:5;fill:none;stroke-linecap:round;marker-end:url(#arrow)}
    .label{font:700 24px system-ui,Segoe UI,Arial;fill:#0f172a}
    .code{font:700 18px ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;fill:#334155}
    .note{font:500 17px system-ui,Segoe UI,Arial;fill:#475569}
  </style>
  <defs><marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#8a1538"/></marker></defs>
  <text class="title" x="44" y="58">rosbag: Record Once, Debug Many Times</text>
  <rect class="box" x="58" y="160" width="230" height="210"/>
  <text class="label" x="173" y="210" text-anchor="middle">Live ROS Topics</text>
  <text class="code" x="173" y="260" text-anchor="middle">/joint_states</text>
  <text class="code" x="173" y="300" text-anchor="middle">/tf</text>
  <text class="code" x="173" y="340" text-anchor="middle">/trajectory</text>
  <rect class="bag" x="384" y="180" width="232" height="168"/>
  <text class="label" x="500" y="240" text-anchor="middle">Bag File</text>
  <text class="code" x="500" y="288" text-anchor="middle">trial_01/</text>
  <rect class="box" x="712" y="160" width="230" height="210"/>
  <text class="label" x="827" y="210" text-anchor="middle">Replay + Inspect</text>
  <text class="code" x="827" y="260" text-anchor="middle">ros2 bag play</text>
  <text class="code" x="827" y="300" text-anchor="middle">rviz2</text>
  <text class="code" x="827" y="340" text-anchor="middle">rqt_graph</text>
  <path class="arrow" d="M288 265H370"/>
  <path class="arrow" d="M616 265H698"/>
  <rect class="box" x="198" y="460" width="604" height="78"/>
  <text class="code" x="500" y="509" text-anchor="middle">ros2 bag record /joint_states /tf</text>
  <text class="note" x="500" y="575" text-anchor="middle">A bag records topic messages so you can replay a test without rerunning the whole simulation.</text>
</svg>
