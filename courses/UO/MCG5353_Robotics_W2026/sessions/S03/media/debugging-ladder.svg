<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 640" role="img" aria-labelledby="title desc">
  <title id="title">ROS debugging ladder</title>
  <desc id="desc">A ladder showing the order for debugging ROS 2 systems.</desc>
  <rect width="1000" height="640" fill="#fff"/>
  <style>
    .title{font:700 34px system-ui,Segoe UI,Arial;fill:#0f172a}
    .step{fill:#fff;stroke:#8a1538;stroke-width:3;rx:18}
    .num{font:800 26px system-ui,Segoe UI,Arial;fill:#8a1538}
    .label{font:700 24px system-ui,Segoe UI,Arial;fill:#0f172a}
    .code{font:700 17px ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;fill:#475569}
  </style>
  <text class="title" x="44" y="58">Debug In This Order</text>
  <rect class="step" x="98" y="104" width="804" height="62"/><text class="num" x="132" y="144">1</text><text class="label" x="190" y="144">Environment</text><text class="code" x="500" y="144">printenv ROS_DISTRO, which ros2</text>
  <rect class="step" x="98" y="184" width="804" height="62"/><text class="num" x="132" y="224">2</text><text class="label" x="190" y="224">Workspace</text><text class="code" x="500" y="224">cb, si, echo $AMENT_PREFIX_PATH</text>
  <rect class="step" x="98" y="264" width="804" height="62"/><text class="num" x="132" y="304">3</text><text class="label" x="190" y="304">Nodes</text><text class="code" x="500" y="304">ros2 node list, ros2 node info</text>
  <rect class="step" x="98" y="344" width="804" height="62"/><text class="num" x="132" y="384">4</text><text class="label" x="190" y="384">Topics</text><text class="code" x="500" y="384">ros2 topic list, echo, info</text>
  <rect class="step" x="98" y="424" width="804" height="62"/><text class="num" x="132" y="464">5</text><text class="label" x="190" y="464">Interfaces</text><text class="code" x="500" y="464">ros2 interface show</text>
  <rect class="step" x="98" y="504" width="804" height="62"/><text class="num" x="132" y="544">6</text><text class="label" x="190" y="544">Graph + Parameters</text><text class="code" x="500" y="544">rqt_graph, ros2 param list</text>
</svg>
