<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Choose Unit & Lesson — Teaching Decks</title>
  <style>
    :root {
      --page-bg: #0f172a;
      --page-surface: #020617;
      --page-surface-hover: #0b1220;
      --page-border: rgba(148, 163, 184, 0.4);
      --page-border-hover: #e5e7eb;
      --page-text: #e2e8f0;
      --page-muted: #cbd5e1;
      --page-link: #93c5fd;
    }

    body {
      margin: 0;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      background: var(--page-bg);
      color: var(--page-text);
    }

    body[data-theme="arian"] {
      --page-bg: #24130f;
      --page-surface: #321912;
      --page-surface-hover: #3b1f18;
      --page-border: rgba(231, 111, 54, 0.36);
      --page-border-hover: rgba(247, 162, 98, 0.72);
      --page-text: #fff7ed;
      --page-muted: #f3d2bd;
      --page-link: #f7a35c;
    }

    .wrap {
      max-width: 980px;
      margin: 40px auto;
      padding: 0 16px;
    }

    h1 {
      margin: 0 0 10px 0;
      font-size: 30px;
    }

    h2 {
      margin: 20px 0 8px 0;
      font-size: 22px;
    }

    p {
      color: var(--page-muted);
      line-height: 1.5;
    }

    .back-link {
      display: inline-block;
      margin-bottom: 16px;
      color: var(--page-link);
      text-decoration: none;
      font-size: 14px;
    }

    .back-link:hover {
      text-decoration: underline;
    }

    .session-card {
      background: var(--page-surface);
      border-radius: 8px;
      padding: 16px;
      border: 1px solid var(--page-border);
      margin-top: 16px;
    }

    .session-header {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      gap: 8px;
      flex-wrap: wrap;
    }

    .session-tag {
      font-size: 12px;
      padding: 4px 10px;
      border-radius: 999px;
      border: 1px solid var(--page-border);
      color: var(--page-muted);
    }

    .topic-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 10px;
    }

    .topic-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 8px 14px;
      border-radius: 999px;
      border: 1px solid var(--page-border);
      background: var(--page-surface);
      color: var(--page-text);
      text-decoration: none;
      font-size: 14px;
      cursor: pointer;
      transition: border-color 0.15s ease, background 0.15s ease, transform 0.15s ease;
    }

    .topic-btn:hover {
      border-color: var(--page-border-hover);
      background: var(--page-surface-hover);
      transform: translateY(-1px);
    }

    code {
      background: var(--page-surface-hover);
      padding: 2px 4px;
      border-radius: 4px;
      font-size: 13px;
    }
  </style>
</head>

<body>
  <div class="wrap">
    <a id="backLink" class="back-link" href="courses.html">← Back to courses</a>
    <h1 id="title">Choose unit & lesson</h1>
    <p id="subtitle"></p>

    <div id="sessionsContainer"></div>
  </div>

  <script type="module">
    import {
      getCourseConfig,
      getSchoolConfig,
    } from "./shared/course_catalog.js";
    import {
      buildLessonIndex,
      formatLessonLabel,
      formatUnitLabel,
      getCourseTerminology,
    } from "./shared/course_labels.js";

    const params = new URLSearchParams(window.location.search);
    const school = params.get("school") || "AC";
    const courseId = params.get("course") || "";

    const schoolCfg = getSchoolConfig(school);
    const cfg = getCourseConfig(courseId);
    document.body.dataset.theme = schoolCfg.theme || "";

    const titleEl = document.getElementById("title");
    const subtitleEl = document.getElementById("subtitle");
    const sessionsEl = document.getElementById("sessionsContainer");
    const backLink = document.getElementById("backLink");

    backLink.href = `courses.html?school=${encodeURIComponent(school)}`;

    if (!cfg) {
      titleEl.textContent = "Unknown or unconfigured course";
      subtitleEl.textContent = `course="${courseId}"`;
      sessionsEl.innerHTML = "<p>No units configured yet for this course.</p>";
    } else {
      const terminology = getCourseTerminology(cfg);
      const lessonIndex = buildLessonIndex(cfg);

      document.title = `${terminology.chooserTitle} — ${cfg.displayName}`;
      titleEl.textContent = cfg.displayName;
      subtitleEl.textContent = cfg.subtitle || schoolCfg.fallbackSubtitle;

      sessionsEl.innerHTML = "";

      cfg.sessions.forEach((sess, unitIndex) => {
        const unitLabel = formatUnitLabel(sess, unitIndex + 1, terminology);
        const box = document.createElement("div");
        box.className = "session-card";
        box.innerHTML = `
          <div class="session-header">
            <div>
              <h2 style="margin:6px 0 4px 0; color:${cfg.color};">${unitLabel}</h2>
            </div>
            <div style="font-size:13px; color:var(--page-muted);">${sess.desc}</div>
          </div>
          <p style="margin:8px 0 4px 0; font-size:14px; color:var(--page-muted);">
            ${terminology.chooserHint}
          </p>
        `;

        const topicsWrap = document.createElement("div");
        topicsWrap.className = "topic-grid";

        sess.topics.forEach((t) => {
          const globalNumber = lessonIndex.get(`${sess.id}:${t.id}`);
          const a = document.createElement("a");
          a.className = "topic-btn";
          a.textContent = formatLessonLabel(globalNumber, t, terminology);

          a.href =
            `session.html?` +
            `school=${encodeURIComponent(school)}` +
            `&course=${encodeURIComponent(courseId)}` +
            `&session=${encodeURIComponent(sess.id)}` +
            `&topic=${encodeURIComponent(t.id)}`;

          topicsWrap.appendChild(a);
        });

        box.appendChild(topicsWrap);
        sessionsEl.appendChild(box);
      });
    }
  </script>
</body>

</html>
