<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Choose Course — Teaching Decks</title>
  <style>
    :root {
      --page-bg: #0f172a;
      --page-surface: #0b1220;
      --page-border: rgba(226, 232, 240, 0.15);
      --page-border-hover: rgba(226, 232, 240, 0.35);
      --page-text: #e2e8f0;
      --page-muted: #cbd5e1;
      --page-link: #93c5fd;
      --page-shadow: rgba(0, 0, 0, 0.25);
    }

    body {
      margin: 0;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      background: var(--page-bg);
      color: var(--page-text);
    }

    body[data-theme="arian"] {
      --page-bg: #24130f;
      --page-surface: #321912;
      --page-border: rgba(231, 111, 54, 0.36);
      --page-border-hover: rgba(247, 162, 98, 0.72);
      --page-text: #fff7ed;
      --page-muted: #f3d2bd;
      --page-link: #f7a35c;
      --page-shadow: rgba(61, 18, 10, 0.38);
    }

    .wrap {
      max-width: 980px;
      margin: 40px auto;
      padding: 0 16px;
    }

    h1 {
      margin: 0 0 10px 0;
      font-size: 30px;
    }

    p {
      color: var(--page-muted);
      line-height: 1.5;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 16px;
      margin-top: 18px;
    }

    a.card {
      background: var(--page-surface);
      border: 1px solid var(--page-border);
      border-radius: 8px;
      padding: 16px;
      color: var(--page-text);
      text-decoration: none;
      box-shadow: 0 10px 30px var(--page-shadow);
      transition: border-color 0.15s ease, transform 0.15s ease;
      display: block;
    }

    a.card:hover {
      border-color: var(--page-border-hover);
      transform: translateY(-1px);
    }

    .tag {
      display: inline-block;
      font-size: 12px;
      padding: 4px 10px;
      border-radius: 999px;
      border: 1px solid var(--page-border);
      color: var(--page-muted);
      margin-bottom: 6px;
    }

    .back-link {
      display: inline-block;
      margin-bottom: 16px;
      color: var(--page-link);
      text-decoration: none;
      font-size: 14px;
    }

    .back-link:hover {
      text-decoration: underline;
    }
  </style>
</head>

<body>
  <div class="wrap">
    <a class="back-link" href="index.html">← Back to schools</a>
    <h1 id="title">Choose a course</h1>
    <p id="subtitle"></p>

    <div class="grid" id="courseGrid"></div>
  </div>

  <script type="module">
    import {
      getCoursesBySchool,
      getSchoolConfig,
      isSchoolChooserVisible,
    } from "./shared/course_catalog.js";

    const params = new URLSearchParams(window.location.search);
    const school = params.get("school") || "AU";
    if (!isSchoolChooserVisible(school)) {
      window.location.replace("courses.html?school=AU");
      throw new Error("redirect");
    }
    const schoolCfg = getSchoolConfig(school);
    const knownSchool = schoolCfg.id === school;
    const bySchool = getCoursesBySchool(school);
    document.body.dataset.theme = schoolCfg.theme || "";

    const titleEl = document.getElementById("title");
    const subtitleEl = document.getElementById("subtitle");
    const gridEl = document.getElementById("courseGrid");

    titleEl.textContent = knownSchool
      ? schoolCfg.coursesTitle
      : "Choose a course";
    subtitleEl.textContent = knownSchool
      ? schoolCfg.coursesSubtitle
      : "";

    if (!bySchool.length) {
      gridEl.innerHTML = "<p>No courses configured for this school yet.</p>";
    } else {
      gridEl.innerHTML = "";
      bySchool.forEach(c => {
        const a = document.createElement("a");
        a.className = "card";
        a.href = `sessions.html?school=${encodeURIComponent(c.school)}&course=${encodeURIComponent(c.fullId)}`;
        a.innerHTML = `
          <div class="tag">${c.code} • ${c.term}</div>
          <h2 style="margin:10px 0 6px 0; color:${c.color || schoolCfg.courseColor};">
            ${c.title}
          </h2>
          <p style="margin:0;">${c.desc}</p>
        `;
        gridEl.appendChild(a);
      });
    }
  </script>
</body>

</html>
