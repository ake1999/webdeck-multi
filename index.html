<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Arian University — Teaching Decks</title>
  <style>
    body {
      margin: 0;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      background: #24130f;
      color: #fff7ed;
    }

    .wrap {
      max-width: 980px;
      margin: 40px auto;
      padding: 0 16px;
    }

    h1 {
      margin: 0 0 10px 0;
      font-size: 34px;
    }

    p {
      color: #f3d2bd;
      line-height: 1.5;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 16px;
      margin-top: 18px;
    }

    a.card {
      background: #321912;
      border: 1px solid rgba(231, 111, 54, 0.36);
      border-radius: 8px;
      padding: 16px;
      color: #fff7ed;
      text-decoration: none;
      box-shadow: 0 10px 30px rgba(61, 18, 10, 0.38);
      transition: border-color 0.15s ease, transform 0.15s ease;
    }

    a.card:hover {
      border-color: rgba(247, 162, 98, 0.72);
      transform: translateY(-1px);
    }

    .tag {
      display: inline-block;
      font-size: 12px;
      padding: 4px 10px;
      border-radius: 999px;
      border: 1px solid rgba(231, 111, 54, 0.36);
      color: #f3d2bd;
      margin-bottom: 6px;
    }
  </style>
</head>

<body>
  <div class="wrap">
    <h1>Arian University</h1>
    <p>
      Personal-brand calculus courses for YouTube and the website. Pick a course,
      then a unit and lesson.
    </p>

    <div class="grid">
      <a class="card" href="courses.html?school=AU">
        <div class="tag">YouTube / Website</div>
        <h2 style="margin:10px 0 6px 0; color:#f7a35c;">Browse courses</h2>
        <p style="margin:0;">Calculus 1, 2, and 3 — authored slides and lecture plans.</p>
      </a>
    </div>
  </div>
</body>

</html>
